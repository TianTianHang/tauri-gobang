name: Server Build (Ubuntu 22.04)

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/server-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/server-build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则从 Cargo.toml 读取)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(grep '^version' server/Cargo.toml | head -1 | awk -F'"' '{print $2}')

          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          fi

          COMMIT_HASH=$(git rev-parse --short=7 HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "artifact_name=gobang-server-ubuntu22.04-v${VERSION}-${COMMIT_HASH}" >> $GITHUB_OUTPUT

          echo "📦 Version: $VERSION"
          echo "🔖 Commit: $COMMIT_HASH"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并提取二进制
        run: |
          docker buildx build \
            --build-arg DEBIAN_FRONTEND=noninteractive \
            -f server/Dockerfile \
            --load \
            -t gobang-server:build \
            .

          mkdir -p server/artifacts/target/release
          docker create --name gobang-extract gobang-server:build
          docker cp gobang-extract:/usr/local/bin/gobang-server server/artifacts/target/release/
          docker rm gobang-extract
          strip server/artifacts/target/release/gobang-server || true

      - name: 验证二进制
        run: |
          echo "📋 Binary info:"
          file server/artifacts/target/release/gobang-server
          ls -lh server/artifacts/target/release/gobang-server
          echo ""
          echo "🧪 Test basic functionality:"
          docker run --rm -v "$(pwd)/server/artifacts/target/release:/app" ubuntu:20.04 /app/gobang-server --version || \
          docker run --rm -v "$(pwd)/server/artifacts/target/release:/app" ubuntu:20.04 /app/gobang-server --help || true
          echo ""
          echo "📦 Check dependencies:"
          docker run --rm -v "$(pwd)/server/artifacts/target/release:/app" ubuntu:20.04 ldd /app/gobang-server | head -5 || true

      - name: 创建构建信息文件
        run: |
          cat > server/artifacts/target/release/BUILD_INFO.txt << 'EOF'
          Gobang Server Build Information
          ================================
          Version: ${{ steps.version.outputs.version }}
          Commit: ${{ steps.version.outputs.commit_hash }}
          Build Date:
          Runner OS: Ubuntu 20.04 (in Docker)
          Build Method: Docker
          Rust Version:
          Cargo Version:
          Git Branch: ${{ github.ref_name }}
          GitHub Run: ${{ github.run_number }}
          EOF

          sed -i "s/Build Date:/Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")/" server/artifacts/target/release/BUILD_INFO.txt
          RUST_VERSION="via Docker (stable)"
          sed -i "s/Rust Version:/Rust Version: $RUST_VERSION/" server/artifacts/target/release/BUILD_INFO.txt
          CARGO_VERSION="via Docker"
          sed -i "s/Cargo Version:/Cargo Version: $CARGO_VERSION/" server/artifacts/target/release/BUILD_INFO.txt

          cat server/artifacts/target/release/BUILD_INFO.txt

      - name: 打包产物
        run: |
          ARTIFACT_NAME="${{ steps.version.outputs.artifact_name }}"
          mkdir -p "server/artifacts/$ARTIFACT_NAME"
          cp server/artifacts/target/release/gobang-server "server/artifacts/$ARTIFACT_NAME/"
          cp server/artifacts/target/release/BUILD_INFO.txt "server/artifacts/$ARTIFACT_NAME/"

          cd server/artifacts
          tar czf "${ARTIFACT_NAME}.tar.gz" "$ARTIFACT_NAME"

          echo "📦 Artifact contents:"
          tar tzf "${ARTIFACT_NAME}.tar.gz"

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: server/artifacts/${{ steps.version.outputs.artifact_name }}.tar.gz
          retention-days: 90
          if-no-files-found: error

      - name: 构建摘要
        run: |
          echo "## 🎉 构建成功！ 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Binary Name:** \`${{ steps.version.outputs.artifact_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.version.outputs.commit_hash }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Compatibility:** Ubuntu 20.04+ (glibc 2.31)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Method:** Docker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download from Artifacts below" >> $GITHUB_STEP_SUMMARY
